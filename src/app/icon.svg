<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6fa8"/>
      <stop offset="100%" stop-color="#2c4470"/>
    </linearGradient>
  </defs>

  <!-- Yuki's signature card back, tilted like a thrown card -->
  <g transform="rotate(-8 48 48)">
    <!-- White frame -->
    <rect x="19" y="5" width="58" height="86" rx="8" fill="#ffffff"/>
    <!-- Colored panel -->
    <rect x="23" y="9" width="50" height="78" rx="5" fill="url(#panel)"/>

    <!-- Diagonal cross lines -->
    <g stroke="#bfd2ec" stroke-width="1" opacity="0.45" fill="none">
      <path d="M 23 24 L 48 48 L 23 72"/>
      <path d="M 73 24 L 48 48 L 73 72"/>
      <path d="M 48 9 L 48 26 M 48 70 L 48 87"/>
    </g>

    <!-- Nested center diamonds -->
    <g fill="none">
      <path d="M 48 21 L 68 48 L 48 75 L 28 48 Z" stroke="#bfd2ec" stroke-width="1.5" opacity="0.8"/>
      <path d="M 48 29 L 62 48 L 48 67 L 34 48 Z" stroke="#ffd166" stroke-width="1.5"/>
      <path d="M 48 37 L 56 48 L 48 59 L 40 48 Z" fill="#2c4470" stroke="#bfd2ec" stroke-width="1"/>
    </g>
    <circle cx="48" cy="48" r="3" fill="#ffd166"/>

    <!-- Corner dots -->
    <g fill="#ffd166">
      <circle cx="31" cy="17" r="2"/>
      <circle cx="65" cy="17" r="2"/>
      <circle cx="31" cy="79" r="2"/>
      <circle cx="65" cy="79" r="2"/>
    </g>
    <g fill="#bfd2ec" opacity="0.7">
      <circle cx="48" cy="14" r="1.5"/>
      <circle cx="48" cy="82" r="1.5"/>
    </g>
  </g>
</svg>
